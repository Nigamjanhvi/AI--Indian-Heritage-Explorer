name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend
        run: npm install
        working-directory: backend
      - name: Install frontend
        run: npm install
        working-directory: frontend
      - name: Test backend
        run: npm test
        working-directory: backend
      - name: Test frontend
        run: npm test
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Docker build
        run: docker compose build
